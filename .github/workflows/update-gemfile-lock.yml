name: Update Gemfile.lock

on:
  workflow_dispatch:
    inputs:
      gems:
        description: "Space-separated gems to update conservatively (e.g. 'nokogiri activesupport commonmarker')"
        required: false
        default: "nokogiri activesupport commonmarker"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Update selected gems conservatively
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.gems != '' }}
        run: bundle update --conservative ${{ inputs.gems }}

      - name: Generate lockfile
        run: bundle lock

      - name: Create PR if lockfile changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-gemfile-lock
          commit-message: "chore(deps): update Gemfile.lock"
          title: "chore(deps): update Gemfile.lock"
          body: |
            Automated Gemfile.lock update.

            - Generated with `bundle lock`
            - For manual dispatch, selected gems are updated via `bundle update --conservative`
            - Review and merge to keep Bundler dependency graph current
          labels: |
            dependencies
            security
