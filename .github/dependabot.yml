version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "all"
    groups:
      bundler-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      github-pages-stack:
        applies-to: "version-updates"
        patterns:
          - "github-pages"
          - "jekyll*"
          - "liquid"
          - "kramdown*"
          - "nokogiri"
          - "rexml"
          - "addressable"
          - "webrick"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(ci)"
